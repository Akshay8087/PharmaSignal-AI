<svg width="1600" height="420" viewBox="0 0 1600 420" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="bg" x2="1"><stop stop-color="#06131D"/><stop offset="1" stop-color="#071B25"/></linearGradient>
